# JUSTIFICATIVA-GHA: suíte de CLI distribuída e multiplataforma (whitelist 2).
# ALTERNATIVA-DESCARTADA: Vercel CI não fornece matriz nativa Windows/macOS para este runtime Python.
name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python:
          - "3.9"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependency
        run: python -m pip install "jsonschema>=4.18,<5"

      - name: Run test suite
        run: python -m unittest discover -s scripts/tests

      - name: Validate benchmark registry
        run: python scripts/validate-registry.py --skill-root .
